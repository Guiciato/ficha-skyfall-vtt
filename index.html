<section id="tela-criacao" class="escondido min-h-screen p-8">
        <div class="max-w-4xl mx-auto bg-[#0f172a] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
            <h2 id="titulo-form" class="text-2xl font-serif text-amber-500 mb-6">Nova Ficha</h2>
            
            <form id="form-ficha" class="space-y-4">
                <input type="hidden" id="ficha-id">
                <input type="text" id="ficha-nome" placeholder="Nome do Personagem" class="w-full bg-black/40 border border-slate-700 p-3 rounded text-white" required>
                <input type="text" id="ficha-classe" placeholder="Classe / Legado" class="w-full bg-black/40 border border-slate-700 p-3 rounded text-white">
                
                <div class="bg-black/20 p-4 rounded-xl border border-white/5">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-3 tracking-widest">Atributos Base</h3>
                    <div id="container-atributos" class="grid grid-cols-3 md:grid-cols-6 gap-4">
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">FOR</label>
                            <input type="number" id="attr-for" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">DES</label>
                            <input type="number" id="attr-des" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">CON</label>
                            <input type="number" id="attr-con" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">INT</label>
                            <input type="number" id="attr-int" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">SAB</label>
                            <input type="number" id="attr-sab" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[10px] text-amber-500 uppercase font-black mb-1">CAR</label>
                            <input type="number" id="attr-car" class="w-full bg-black/60 border border-slate-700 p-2 rounded text-white text-center font-serif text-xl focus:border-amber-500 outline-none" value="0">
                        </div>
                    </div>
                </div>

                <textarea id="ficha-historia" placeholder="História / Traços" class="w-full bg-black/40 border border-slate-700 p-3 rounded text-white min-h-[100px]"></textarea>

                <div class="flex gap-4 pt-4">
                    <button type="submit" class="flex-1 bg-amber-500 text-black font-black p-3 rounded uppercase hover:bg-amber-400 transition-all">Salvar Ficha</button>
                    <button type="button" onclick="mudarTela('tela-selecao')" class="flex-1 text-slate-400 p-3 rounded border border-slate-700 uppercase hover:text-white transition-all">Cancelar</button>
                </div>
            </form>
        </div>
    </section>

    <section id="tela-dashboard" class="escondido min-h-screen relative flex items-center justify-center overflow-hidden">
        
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale-[0.3] z-0">
            <source src="fundo-animado.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-gradient-to-b from-[#020617]/80 via-transparent to-[#020617]/90 z-0"></div>

        <div class="absolute top-8 right-8 flex gap-4 z-20">
            <button onclick="mudarTela('tela-selecao')" class="bg-black/60 backdrop-blur-md px-6 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-400 hover:bg-white hover:text-black transition-all">Sair</button>
            <button onclick="editarFichaAtiva()" class="bg-amber-500/20 backdrop-blur-md px-6 py-2 rounded-full border border-amber-500/40 text-amber-500 text-[9px] font-black uppercase tracking-widest hover:bg-amber-500 hover:text-black transition-all">⚙️ Editar</button>
        </div>
        
        <div id="dashboard-info" class="text-center z-10 w-full max-w-4xl p-8">
            </div>
    </section>
