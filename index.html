<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Interativa - Skyfall VTT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #e2e8f0; }
        .escondido { display: none !important; }
        /* Barra de rolagem customizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #f59e0b; }
    </style>
</head>
<body class="min-h-screen w-full font-sans overflow-x-hidden select-none bg-[#020617]">

    <section id="tela-selecao" class="h-screen flex flex-col items-center justify-center p-10 relative z-10">
        <h1 class="text-5xl font-serif font-black text-amber-500 mb-2 tracking-[0.2em] italic uppercase drop-shadow-lg">Skyfall VTT</h1>
        <p class="text-slate-500 text-[10px] mb-12 tracking-[0.5em] uppercase font-bold">Selecione seu Legado</p>
        
        <div class="mb-8">
            <label class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Sistema:</label>
            <select id="select-sistema" class="bg-slate-900 border border-slate-700 text-xs p-2 rounded-lg text-white ml-2 outline-none focus:border-amber-500">
                <option value="skyfall">Skyfall RPG</option>
                <option value="tormenta">Tormenta20</option>
            </select>
        </div>

        <div id="lista-fichas" class="flex flex-wrap justify-center gap-8 max-w-5xl">
            </div>

        <div class="mt-16">
            <button onclick="mudarTela('tela-memorial')" class="text-[10px] bg-red-950/30 px-6 py-2 rounded-full border border-red-900/50 text-red-500 font-black uppercase tracking-widest hover:bg-red-900 hover:text-white transition-all">
                🪦 Ver Memorial
            </button>
        </div>
    </section>

    <section id="tela-criacao" class="escondido min-h-screen p-8 relative z-10 flex items-center justify-center">
        <div class="w-full max-w-4xl bg-[#0f172a] p-8 rounded-[2rem] border border-white/5 shadow-2xl">
            <h2 id="titulo-form" class="text-2xl font-serif font-black text-amber-500 mb-6 uppercase italic tracking-widest border-b border-white/5 pb-2">Nova Ficha</h2>
            
            <form id="form-ficha" class="space-y-6">
                <input type="hidden" id="ficha-id">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="ficha-nome" placeholder="Nome do Personagem" class="w-full bg-black/40 border border-slate-700 p-3 rounded-xl text-sm font-bold text-white outline-none focus:border-amber-500 transition-all" required>
                    <input type="text" id="ficha-classe" placeholder="Classe / Legado" class="w-full bg-black/40 border border-slate-700 p-3 rounded-xl text-sm font-bold text-white outline-none focus:border-amber-500 transition-all">
                </div>
                
                <div class="bg-black/20 p-6 rounded-2xl border border-white/5">
                    <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-[0.2em]">Atributos Base</h3>
                    <div id="container-atributos" class="grid grid-cols-3 md:grid-cols-6 gap-4">
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">FOR</label>
                            <input type="number" id="attr-for" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">DES</label>
                            <input type="number" id="attr-des" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">CON</label>
                            <input type="number" id="attr-con" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">INT</label>
                            <input type="number" id="attr-int" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">SAB</label>
                            <input type="number" id="attr-sab" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                        <div class="flex flex-col items-center group">
                            <label class="text-[10px] text-slate-400 group-hover:text-amber-500 uppercase font-black mb-2 transition-colors">CAR</label>
                            <input type="number" id="attr-car" class="w-16 h-16 bg-black/60 border border-slate-700 rounded-2xl text-white text-center font-serif text-2xl font-black focus:border-amber-500 focus:bg-amber-500/10 outline-none transition-all shadow-inner" value="0">
                        </div>
                    </div>
                </div>

                <textarea id="ficha-historia" placeholder="História, Antecedentes e Traços do Personagem..." class="w-full bg-black/40 border border-slate-700 p-4 rounded-2xl text-sm text-slate-300 min-h-[120px] outline-none focus:border-amber-500 transition-all resize-none"></textarea>

                <div class="flex gap-4 pt-4 border-t border-white/5 mt-6">
                    <button type="submit" class="flex-1 bg-amber-500 text-black font-black p-4 rounded-xl text-xs uppercase tracking-widest hover:bg-amber-400 hover:shadow-[0_0_20px_rgba(245,158,11,0.3)] transition-all">Salvar Ficha</button>
                    <button type="button" onclick="mudarTela('tela-selecao')" class="flex-1 text-slate-400 p-4 rounded-xl border border-slate-700 text-xs font-black uppercase tracking-widest hover:text-white hover:bg-white/5 transition-all">Cancelar</button>
                </div>
            </form>
        </div>
    </section>

    <section id="tela-dashboard" class="escondido min-h-screen relative flex items-center justify-center overflow-hidden">
        
        <video autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover opacity-40 grayscale-[0.3] z-0">
            <source src="fundo-animado.mp4" type="video/mp4">
        </video>
        <div class="absolute inset-0 bg-gradient-to-b from-[#020617]/80 via-transparent to-[#020617]/90 z-0"></div>

        <div class="absolute top-8 right-8 flex gap-4 z-20">
            <button onclick="mudarTela('tela-selecao')" class="bg-black/60 backdrop-blur-md px-6 py-2 rounded-full border border-white/10 text-[9px] font-black uppercase tracking-widest text-slate-400 hover:bg-white hover:text-black transition-all shadow-lg">Sair</button>
            <button onclick="editarFichaAtiva()" class="bg-amber-500/20 backdrop-blur-md px-6 py-2 rounded-full border border-amber-500/40 text-amber-500 text-[9px] font-black uppercase tracking-widest hover:bg-amber-500 hover:text-black transition-all shadow-lg">⚙️ Editar</button>
        </div>
        
        <div id="dashboard-info" class="text-center z-10 w-full max-w-4xl p-8">
            </div>
    </section>

    <section id="tela-memorial" class="escondido min-h-screen p-10 flex flex-col items-center relative z-10">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-12 border-b border-red-900/30 pb-6">
                <h1 class="text-4xl font-serif font-black text-red-900 italic uppercase drop-shadow-md">Memorial de Ouroboros</h1>
                <button onclick="mudarTela('tela-selecao')" class="bg-black border border-white/10 px-6 py-2 rounded-full text-[10px] font-black tracking-widest text-slate-400 uppercase hover:bg-white hover:text-black transition-all">Voltar à Seleção</button>
            </div>
            <div id="lista-cemiterio" class="grid grid-cols-2 md:grid-cols-4 gap-8">
                </div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
