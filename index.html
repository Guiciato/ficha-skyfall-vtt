<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyfall VTT - Versão 1.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #020617; 
            color: #e2e8f0; 
            font-family: 'Inter', sans-serif;
        }
        .font-serif { font-family: 'Cinzel Decorative', serif; }
        .escondido { display: none !important; }
        
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen w-full overflow-x-hidden select-none">

    <video autoplay loop muted playsinline class="fixed inset-0 w-full h-full object-cover z-0 opacity-60">
        <source src="fundo-animado.mp4" type="video/mp4">
    </video>
    <div class="fixed inset-0 bg-gradient-to-b from-[#020617]/90 via-transparent to-[#020617]/90 z-[1]"></div>

    <section id="tela-login" class="relative z-10 h-screen flex flex-col items-center justify-center p-10">
        <div class="glass p-10 rounded-[3rem] w-full max-w-md shadow-2xl text-center">
            <h1 class="text-4xl font-serif font-black text-amber-500 mb-2 italic uppercase">Acesso VTT</h1>
            <p class="text-slate-400 text-[10px] mb-8 tracking-[0.2em] uppercase font-bold">Identifique-se para acessar suas fichas</p>
            
            <input type="text" id="login-user" placeholder="Nome de Usuário" class="w-full bg-black/60 border border-white/10 p-4 rounded-xl text-white outline-none focus:border-amber-500 mb-4 transition-all text-center">
            <button onclick="fazerLogin()" class="w-full bg-amber-500 text-black font-black p-4 rounded-xl uppercase tracking-widest hover:bg-amber-400 shadow-lg transition-all mb-4">Entrar</button>
            <p class="text-[9px] text-slate-500 uppercase">(Por enquanto, digite qualquer nome para criar a sessão)</p>
        </div>
    </section>

    <section id="tela-selecao" class="escondido relative z-10 h-screen flex flex-col items-center justify-center p-10">
        <div class="absolute top-8 right-8 text-[10px] uppercase font-bold text-slate-500 glass px-4 py-2 rounded-full">
            Usuário: <span id="display-user" class="text-amber-500"></span> 
            <button onclick="fazerLogout()" class="ml-4 hover:text-white border-l border-white/10 pl-4">Sair</button>
        </div>

        <h1 class="text-6xl font-serif font-black text-amber-500 mb-2 tracking-[0.2em] italic uppercase drop-shadow-[0_5px_15px_rgba(0,0,0,1)]">Skyfall VTT</h1>
        <p class="text-slate-400 text-[10px] mb-8 tracking-[0.5em] uppercase font-bold drop-shadow-md">Selecione seu Legado</p>
        
        <div class="mb-12 flex items-center gap-4">
            <div class="flex items-center glass px-4 py-2 rounded-xl">
                <label class="text-[10px] text-slate-300 uppercase font-bold tracking-widest">Sistema Ativo:</label>
                <select id="select-sistema" onchange="renderizarSelecao()" class="bg-transparent border-none text-xs text-amber-500 font-black ml-2 outline-none cursor-pointer">
                    </select>
            </div>
            <button onclick="mudarTela('tela-sistema')" class="glass px-4 py-2 rounded-xl text-[10px] text-pink-500 font-black uppercase tracking-widest hover:bg-pink-500/10 transition-all">+ Criar Sistema</button>
        </div>

        <div id="lista-fichas" class="flex flex-wrap justify-center gap-8 max-w-5xl">
            </div>

        <div class="mt-16">
            <button onclick="mudarTela('tela-memorial')" class="text-[10px] glass hover:bg-red-950/80 px-8 py-3 rounded-full border border-red-900/50 text-red-500 font-black uppercase tracking-widest transition-all shadow-lg">
                🪦 Ver Memorial
            </button>
        </div>
    </section>

    <section id="tela-sistema" class="escondido relative z-10 min-h-screen p-10 flex flex-col items-center justify-center">
        <div class="glass p-10 rounded-[3rem] w-full max-w-2xl shadow-2xl">
            <h2 class="text-3xl font-serif font-black text-pink-500 uppercase italic border-b border-white/10 pb-4 mb-6">Novo Sistema RPG</h2>
            
            <label class="text-[10px] font-black text-pink-400 uppercase block mb-2">Nome do Sistema</label>
            <input type="text" id="sys-nome" placeholder="Ex: Call of Cthulhu" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white mb-6 outline-none focus:border-pink-500">
            
            <label class="text-[10px] font-black text-pink-400 uppercase block mb-2">Atributos (Separados por vírgula)</label>
            <input type="text" id="sys-atributos" placeholder="Ex: FOR, DES, INT, SAB" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white mb-6 outline-none focus:border-pink-500">
            
            <label class="text-[10px] font-black text-pink-400 uppercase block mb-2">Barras de Status (Separadas por vírgula)</label>
            <input type="text" id="sys-barras" placeholder="Ex: Vida, Sanidade, Magia" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white mb-8 outline-none focus:border-pink-500">
            
            <div class="flex gap-4">
                <button onclick="salvarSistema()" class="flex-1 bg-pink-600 text-white font-black p-4 rounded-xl uppercase tracking-widest hover:bg-pink-500 transition-all shadow-lg">Salvar Sistema</button>
                <button onclick="mudarTela('tela-selecao')" class="flex-1 text-slate-400 p-4 rounded-xl border border-white/10 font-black uppercase hover:text-white hover:bg-white/5 transition-all">Voltar</button>
            </div>
        </div>
    </section>

    <section id="tela-criacao" class="escondido relative z-10 min-h-screen p-6 flex items-center justify-center">
        <div class="w-full max-w-[1400px] grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
            
            <div class="glass p-6 rounded-[2.5rem] space-y-4 shadow-2xl">
                <h2 class="text-2xl font-serif font-black text-amber-500 uppercase italic border-b border-white/10 pb-2">Identidade</h2>
                <div class="space-y-3">
                    <input type="hidden" id="ficha-id">
                    
                    <label class="text-[10px] font-black text-amber-500/70 uppercase block ml-2">Nome do Personagem</label>
                    <input type="text" id="ficha-nome" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-amber-500 transition-all">
                    
                    <label class="text-[10px] font-black text-amber-500/70 uppercase block ml-2">Classe / Legado</label>
                    <input type="text" id="ficha-classe" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-amber-500 transition-all">
                    
                    <label class="text-[10px] font-black text-amber-500/70 uppercase block ml-2">URL da Imagem</label>
                    <input type="text" id="ficha-imagem" class="w-full bg-black/60 border border-white/10 p-3 rounded-xl text-white outline-none focus:border-amber-500 transition-all">
                </div>
                <div class="pt-6 space-y-3">
                    <button onclick="salvarFicha()" class="w-full bg-amber-500 text-black font-black p-4 rounded-2xl uppercase tracking-widest hover:bg-amber-400 shadow-lg transition-all">Salvar Ficha</button>
                    <button onclick="mudarTela('tela-selecao')" class="w-full text-slate-500 text-[10px] font-black uppercase hover:text-white transition-all">Cancelar</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem] shadow-2xl">
                <div class="flex justify-between items-center border-b border-white/10 pb-2 mb-4">
                    <h2 class="text-2xl font-serif font-black text-pink-500 uppercase italic">Layout & Dados</h2>
                </div>
                <div id="container-atributos-dinamicos" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                </div>
            </div>

            <div class="glass p-6 rounded-[2.5rem] shadow-2xl space-y-4">
                <h2 class="text-2xl font-serif font-black text-purple-500 uppercase italic border-b border-white/10 pb-2">Traços & Textos</h2>
                <div class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    <div>
                        <label class="text-[10px] font-black text-purple-400 uppercase block mb-1">História / Background</label>
                        <textarea id="txt-historia" class="w-full bg-black/60 border border-white/10 p-4 rounded-xl text-sm text-slate-300 min-h-[120px] outline-none focus:border-purple-500 resize-none"></textarea>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <section id="tela-dashboard" class="escondido relative z-10 min-h-screen flex flex-col items-center justify-center p-8">
        <div class="absolute top-8 right-8 flex gap-4 z-50">
            <button onclick="mudarTela('tela-selecao')" class="glass px-6 py-2 rounded-full text-[9px] font-black uppercase tracking-widest text-slate-400 hover:bg-white hover:text-black transition-all">Voltar</button>
            <button onclick="editarFichaAtiva()" class="bg-amber-500/20 border border-amber-500/40 px-6 py-2 rounded-full text-amber-500 text-[9px] font-black uppercase tracking-widest hover:bg-amber-500 hover:text-black transition-all">⚙️ Editar</button>
        </div>
        <div id="dashboard-info" class="text-center w-full max-w-5xl"></div>
    </section>

    <section id="tela-memorial" class="escondido relative z-10 min-h-screen p-10 flex flex-col items-center">
        <div class="w-full max-w-5xl">
            <div class="flex justify-between items-center mb-12 border-b border-red-900/30 pb-6 glass px-8 rounded-3xl">
                <h1 class="text-4xl font-serif font-black text-red-500 italic uppercase">Memorial de Ouroboros</h1>
                <button onclick="mudarTela('tela-selecao')" class="bg-black/50 border border-white/10 px-6 py-2 rounded-full text-[10px] font-black tracking-widest text-slate-400 uppercase hover:bg-white hover:text-black transition-all">Voltar</button>
            </div>
            <div id="lista-cemiterio" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <script src="app.js"></script>
</body>
</html>
